  {
    title:"Reading Star Clusters: The Main-Sequence Turnoff",
    big:"Because massive stars die first, the precise point where a cluster's stars peel off the main sequence acts like a clock — and lets us read the age of the cluster directly off the H-R diagram.",
    recall:{q:"What is the final fate of a Sun-like star, and what does it leave behind?",
            a:"It ejects its envelope as a planetary nebula and leaves a cooling carbon-oxygen white dwarf."},
    body:`
      <p>Here is the payoff promised since Day 44 — the moment the H-R diagram becomes a clock. Recall that a cluster's stars are all the same age (Day 65), and that lifetime depends sharply on mass (Day 66). Now plot a whole cluster on the H-R diagram and watch what time does to it.</p>
      <h3>The turnoff as a clock</h3>
      <p>When a cluster is young, every star sits on the main sequence. But the most massive stars burn out first and peel away toward the giant branch. As the cluster ages, the "burned-out" point creeps steadily down the main sequence from the top. The location of this <em>main-sequence turnoff</em> — the brightest point where stars are still on the main sequence — tells you the age of the cluster: the fainter and lower the turnoff, the older the cluster.</p>
      <p>It works because the turnoff marks exactly the mass whose main-sequence lifetime equals the cluster's current age. Match it to theoretical <em>isochrones</em> (model snapshots of a coeval population) and you read off the age directly.</p>
      <div class="aside"><b>What this unlocks:</b> this single technique dates star clusters from millions to billions of years old. The oldest globular clusters in our galaxy turn out to be roughly 12–13 billion years old — a measurement that sets a hard lower limit on the age of the universe itself, a result we'll need in Part V. A diagram invented to classify stars now measures cosmic time.</div>
      <p>That closes Chapter 13. We've followed low- and intermediate-mass stars from birth to white dwarf. But pulsating stars (next chapter) give us a different cosmic ruler — and massive stars (Chapter 15) die in a far more violent way.</p>
    `,

{ ch:14, title:"Stellar Pulsation", days:[
  {
    title:"Variable Stars — Stars That Breathe",
    big:"Some stars don't shine steadily — they swell and shrink in a regular rhythm, brightening and dimming like a slow cosmic heartbeat.",
    recall:{q:"How does the main-sequence turnoff of a cluster reveal its age?",
            a:"Massive stars die first, so the turnoff creeps down the main sequence over time; its position marks the mass whose lifetime equals the cluster's age."},
    body:`
      <p>Most stars shine steadily, but a special class — <em>intrinsic variable stars</em> — change their brightness in regular cycles because they physically <em>pulsate</em>, rhythmically expanding and contracting. As a pulsating star swells and shrinks, its size and surface temperature change, and so does its brightness, in a repeating pattern that can last hours to months.</p>
      <h3>Not all variables are the same</h3>
      <p>It's worth distinguishing pulsation from other causes of variability. An eclipsing binary (Day 39) dims because one star blocks another — that's geometry, not pulsation. A flaring star brightens from magnetic outbursts. True pulsators, by contrast, vary because the whole star is breathing. This chapter is about those.</p>
      <h3>The instability strip</h3>
      <p>Pulsating stars aren't scattered randomly across the H-R diagram. Most cluster in a nearly vertical band called the <em>instability strip</em>, crossing the diagram from luminous supergiants down toward the white dwarfs. A star pulsates when its evolution carries it into this strip — and falls quiet when it leaves. This is another way the H-R diagram organizes stellar physics: location predicts behavior.</p>
      <div class="aside"><b>Why this chapter matters enormously:</b> pulsating stars in the instability strip include the Cepheids — and a pattern in their pulsations, discovered by Henrietta Leavitt, became the key that unlocked the distances to other galaxies and ultimately the expansion of the universe. The next four days build toward that. A breathing star will become a measuring stick for the cosmos.</div>
    `,
    takeaways:[
      "Intrinsic variable stars change brightness because they physically pulsate — expanding and contracting rhythmically.",
      "Pulsation differs from eclipses (geometry) or flares (magnetic outbursts); the whole star is 'breathing.'",
      "Pulsating stars cluster in the instability strip — a nearly vertical band on the H-R diagram.",
      "A star pulsates when evolution carries it into the strip and stops when it leaves."
    ],
    refs:[
      {kind:"Overview",title:"Variable stars and stellar pulsation",desc:"The kinds of variable stars and what makes some physically pulsate.",url:"https://www.google.com/search?q=variable+stars+stellar+pulsation+types"},
      {kind:"Region",title:"The instability strip on the H-R diagram",desc:"The band where stars pulsate, and why position predicts the behavior.",url:"https://www.google.com/search?q=instability+strip+HR+diagram+pulsating+stars"},

  {
    title:"Cepheids & the Period–Luminosity Relation",
    big:"Henrietta Leavitt noticed that the slower a certain kind of star pulses, the brighter it truly is — and that single regularity became a cosmic measuring tape.",
    recall:{q:"Where on the H-R diagram do most pulsating stars lie, and what determines whether a given star pulsates?",
            a:"In the instability strip; a star pulsates when its evolutionary track carries it into that band and stops when it leaves."},
    body:`
      <p><em>Cepheid variables</em> are luminous, yellow supergiant pulsators with very regular cycles of days to weeks. They're the aristocrats of variable stars — and the reason is a discovery made over a century ago by <em>Henrietta Leavitt</em> at Harvard.</p>
      <h3>Leavitt's law</h3>
      <p>Studying Cepheids in the Magellanic Clouds (all at roughly the same distance from us), Leavitt found a clean relationship: the longer a Cepheid's pulsation period, the greater its intrinsic luminosity. This <em>period–luminosity relation</em> is the magic. Measure a Cepheid's period — just time how long its brightness cycle takes — and you instantly know its true luminosity (absolute magnitude).</p>
      <h3>A standard candle</h3>
      <p>And once you know a star's true brightness and compare it to how bright it merely <em>appears</em>, the distance modulus (Day 8) hands you the distance — exactly as with spectroscopic parallax (Day 45), but reaching vastly farther because Cepheids are so luminous. A star whose true wattage you can read from its blink rate is called a <em>standard candle</em>, and Cepheids are the gold-standard example.</p>
      <div class="eq">measure period → get luminosity (M) → with apparent magnitude (m) → distance</div>
      <div class="aside"><b>Credit where overdue:</b> Henrietta Leavitt was a "computer" at Harvard (like Annie Jump Cannon, Day 41), and her period–luminosity law is arguably one of the most consequential discoveries in astronomy — it's the rung of the distance ladder that let Edwin Hubble measure the distance to Andromeda and prove other galaxies exist. We'll see that moment in Part V. Tomorrow: <em>why</em> these stars pulse so reliably.</div>
    `,
    takeaways:[
      "Cepheids are luminous, regularly pulsating yellow supergiants.",
      "Henrietta Leavitt discovered the period–luminosity relation: longer period ⇒ greater intrinsic luminosity.",
      "Timing a Cepheid's pulsation period reveals its true luminosity (absolute magnitude).",
      "Comparing true vs. apparent brightness gives distance — making Cepheids powerful 'standard candles.'"
    ],
    refs:[
      {kind:"Discovery",title:"Henrietta Leavitt and the period–luminosity relation",desc:"How one astronomer's careful work turned Cepheids into cosmic distance markers.",url:"https://www.google.com/search?q=Henrietta+Leavitt+Cepheid+period+luminosity+relation"},
      {kind:"Tool",title:"Cepheids as standard candles",desc:"Using a star's pulsation period to measure distances across the universe.",url:"https://www.google.com/search?q=Cepheid+variable+standard+candle+distance"},

    reflect:"You find two Cepheids; one cycles every 3 days, the other every 30 days. Using Leavitt's law, which is intrinsically more luminous — and if they appeared equally bright in the sky, which would be farther away?"

  {
    title:"The Kappa Mechanism — Why Stars Pulsate",
    big:"A pulsating star runs on a hidden valve deep inside it — a layer of gas that traps heat as it compresses, then releases it, driving the whole star to bounce.",
    recall:{q:"What does a Cepheid's pulsation period tell you, thanks to Leavitt's law?",
            a:"Its intrinsic luminosity (absolute magnitude) — which, compared to apparent brightness, yields the distance."},
    body:`
      <p>Why should a star pulse like clockwork rather than just sitting in equilibrium? The answer is a clever heat-engine buried in the star's envelope, called the <em>kappa mechanism</em> (κ is the symbol for opacity, from Day 47).</p>
      <h3>The opacity valve</h3>
      <p>In a normal layer of a star, compressing the gas makes it more transparent, so heat escapes easily and the layer doesn't bounce back — pulsations die out. But in a special zone where helium is partially ionized, compression does the opposite: it makes the gas <em>more</em> opaque. So when the star contracts and squeezes this layer, the layer traps heat instead of releasing it. The trapped heat builds pressure, pushing the layer back out; as it expands it becomes transparent again, dumps its heat, and falls back — and the cycle repeats. The opacity acts like a valve, pumping energy into the oscillation each cycle.</p>
      <h3>Why only in the strip</h3>
      <p>This works only when that helium-ionization zone sits at just the right depth — which happens only for stars in a narrow temperature range. That range <em>is</em> the instability strip (Day 71). Too hot or too cool, and the valve sits in the wrong place and the star won't pulse. The geometry of the H-R diagram and the physics of pulsation line up perfectly.</p>
      <div class="aside"><b>An engine, literally:</b> the kappa mechanism is a genuine thermodynamic heat engine — absorbing heat when compressed, doing work when it expands — like a piston. The same opacity we introduced to explain why we see only a star's surface (Day 47) turns out, in just the right layer, to make an entire star breathe.</div>
    `,
    takeaways:[
      "The kappa (opacity) mechanism drives pulsation: a partial-ionization layer becomes MORE opaque when compressed.",
      "That layer traps heat on compression, builds pressure, pushes back out, releases heat, and falls — a self-sustaining cycle.",
      "It acts as a heat-engine valve, pumping energy into the oscillation each cycle.",
      "It works only when the ionization zone sits at the right depth — defining the instability strip's temperature range."
    ],
    refs:[
      {kind:"Mechanism",title:"The kappa mechanism of stellar pulsation",desc:"How an opacity-driven valve in a star's envelope sustains regular pulsations.",url:"https://www.google.com/search?q=kappa+mechanism+stellar+pulsation+opacity+ionization"},
      {kind:"Connection",title:"Why the instability strip exists",desc:"How the depth of the helium ionization zone ties pulsation to a specific region of the H-R diagram.",url:"https://www.google.com/search?q=instability+strip+helium+ionization+zone+pulsation"},
    ],
    reflect:"The kappa mechanism needs a layer that traps heat when squeezed. Why would a layer that instead let heat escape easily when compressed cause pulsations to fade out rather than continue?"
  },
  {
    title:"RR Lyrae and the Family of Pulsators",
    big:"Cepheids are not alone — a whole family of pulsating stars, each suited to different distances and stellar populations, gives astronomers a versatile set of cosmic rulers.",

    body:`
      <p>The instability strip hosts several types of pulsator, each useful in its own way. Knowing the family helps you pick the right ruler for the job.</p>
      <h3>RR Lyrae stars</h3>
      <p><em>RR Lyrae</em> variables are old, low-mass, metal-poor stars on the horizontal branch (Day 68), pulsing rapidly — periods under a day. Crucially, they all have nearly the <em>same</em> intrinsic luminosity, which makes them superb standard candles. And because they're old, they populate globular clusters and the galactic halo — letting us measure distances to those ancient systems where bright young Cepheids are absent.</p>
      <h3>Other members</h3>
      <p><em>Mira variables</em> are pulsating red giants (AGB stars, Day 69) with long, somewhat irregular periods of months and huge brightness swings. There are also rapidly oscillating white dwarfs and Sun-like stars whose tiny pulsations are studied by <em>asteroseismology</em> — the same trick as helioseismology (Day 56), reading a star's interior from its oscillation modes.</p>
      <div class="aside"><b>Two complementary candles:</b> Cepheids are young, massive, and brilliant — they reach far but live in star-forming galaxies. RR Lyrae are old, modest, and everywhere the ancient stars are — perfect for the Milky Way's halo and globular clusters. Between them, astronomers can range from nearby clusters out toward other galaxies. Tomorrow we put these rulers to work on the cosmos itself.</div>
    `,

      {kind:"Method",title:"Asteroseismology",desc:"Probing the interiors of stars through their natural oscillations.",url:"https://www.google.com/search?q=asteroseismology+stellar+oscillations+interior"},

    reflect:"RR Lyrae stars are found in ancient globular clusters, while classical Cepheids are found in regions of recent star formation. Based on the masses and lifetimes involved, why would each type live where it does?"

  {
    title:"Measuring the Universe with Pulsating Stars",
    big:"By timing the heartbeats of pulsating stars in other galaxies, astronomers built the ladder that measures the cosmos — and discovered the universe is far bigger than anyone imagined.",
    recall:{q:"Why are RR Lyrae and Cepheid variables complementary as standard candles?",
            a:"Cepheids are young, massive, and brilliant (reaching far, in star-forming galaxies); RR Lyrae are old and uniform (ideal for globular clusters and the halo)."},
    body:`
      <p>Now we cash in the pulsating stars. Because a Cepheid or RR Lyrae tells you its own true luminosity through its pulsation, spotting one in a distant cluster or galaxy lets you measure how far away that whole system is. This is the next great rung of the <em>cosmic distance ladder</em> (begun with parallax, Day 14, and spectroscopic parallax, Day 45).</p>
      <h3>The ladder, rung by rung</h3>
      <p>Parallax measures distances to nearby stars directly. Those nearby stars calibrate the standard candles — including a few Cepheids close enough to anchor the period–luminosity relation. Calibrated Cepheids then reach out to other galaxies, far beyond parallax's range. Each rung is built on the one below: the ladder lets us step outward from our backyard to the depths of space.</p>
      <h3>The discovery that changed everything</h3>
      <p>In the 1920s, Edwin Hubble found Cepheids in the "Andromeda nebula" and used Leavitt's law to measure its distance — proving it lay far outside the Milky Way. Andromeda was a separate <em>galaxy</em>. Overnight, the universe expanded from one galaxy to countless billions. And measuring the distances and motions of many galaxies soon revealed they're rushing apart — the expanding universe. Pulsating stars made all of it measurable.</p>
      <div class="aside"><b>Bridge to Part V:</b> that's where this leads — Cepheids and their cousins are the foundation on which the entire extragalactic distance scale, and modern cosmology, is built. We'll return to Hubble's expanding universe in Part V. For now, the lesson stands: a humble breathing star, understood through the kappa mechanism, measures the size of the cosmos.</div>
      <p>That closes Chapter 14. We've used low-mass stars as clocks and rulers. Now Chapter 15 turns to the rare, massive stars — whose deaths forge the elements and outshine entire galaxies.</p>
    `,
    takeaways:[

      {kind:"History",title:"Hubble, Cepheids, and the discovery of other galaxies",desc:"How a Cepheid in Andromeda proved the universe extends far beyond the Milky Way.",url:"https://www.google.com/search?q=Hubble+Cepheid+Andromeda+galaxy+distance+discovery"},

{ ch:15, title:"The Fate of Massive Stars", days:[
  {
    title:"Massive Stars Live Fast",
    big:"The galaxy's rare heavyweight stars burn through their fuel in a cosmic instant — and their brief, brilliant lives set them on a path to a violent end.",
    recall:{q:"How did Hubble use Cepheids to transform our view of the universe?",
            a:"He found Cepheids in Andromeda, used Leavitt's law to measure its distance, and proved it's a separate galaxy — revealing a universe of countless galaxies."},
    body:`
      <p>Most stars are lightweights that end as quiet white dwarfs (Day 69). But the rare massive stars — say, more than about eight times the Sun's mass — live and die completely differently. This chapter follows them, because their deaths forge the heavy elements and reshape galaxies.</p>
      <h3>Living fast</h3>
      <p>A massive star is enormously luminous (mass–luminosity relation, Day 40), so it devours its hydrogen at a furious rate. Where the Sun lasts ten billion years, a massive star may last only a few million — a blink. It fuses hydrogen primarily through the temperature-sensitive CNO cycle (Day 54), driving a vigorously convective core. It's hot, blue, and brilliant — and burning toward an early grave.</p>
      <h3>The crucial difference</h3>
      <p>The key distinction from low-mass stars is that a massive star's core <em>can</em> reach the colossal temperatures needed to fuse elements beyond carbon. A low-mass star stalls after helium, sheds its envelope, and quits. A massive star just keeps going — igniting heavier and heavier fuels in succession, building up a layered structure we'll see tomorrow. That ability to keep fusing is what makes massive stars the universe's element factories — and what dooms them.</p>
      <div class="aside"><b>Why "fast" matters cosmically:</b> because massive stars live and die so quickly, they enrich the galaxy with heavy elements early and often, and they're always found near where stars are actively forming — they don't live long enough to wander far from their birth clouds. They're rare, but their outsized influence on the chemistry of the cosmos is the theme of this chapter.</div>
    `,
    takeaways:[
      "Massive stars (roughly >8 solar masses) evolve completely differently from low-mass stars.",
      "Being highly luminous, they burn fuel fast — lasting only millions of years versus billions for the Sun.",
      "They fuse hydrogen via the CNO cycle with convective cores; they're hot, blue, and brilliant.",
      "Crucially, their cores get hot enough to fuse elements beyond carbon — making them element factories."
    ],
    refs:[
      {kind:"Lives",title:"How massive stars evolve",desc:"The fast, luminous lives of high-mass stars and why they differ from Sun-like stars.",url:"https://www.google.com/search?q=massive+star+evolution+high+mass+life+cycle"},
      {kind:"Why fast",title:"Why massive stars have short lifetimes",desc:"The link between high luminosity, rapid fuel consumption, and brief lives.",url:"https://www.google.com/search?q=massive+star+short+lifetime+luminosity+fuel"},
    ],
    reflect:"A massive star has far more nuclear fuel than the Sun, yet lives a thousand times shorter. What does this tell you about how its rate of energy production compares to the Sun's?"

  {
    title:"Building Heavier Elements: Advanced Burning",
    big:"In its final stages, a massive star becomes a cosmic onion — concentric shells fusing ever-heavier elements, layer upon layer, all the way down to iron.",
    recall:{q:"What can a massive star's core do that a low-mass star's cannot?",
            a:"Reach the extreme temperatures needed to fuse elements heavier than carbon, continuing fusion in successive stages."},
    body:`
      <p>After helium burning makes carbon and oxygen, a massive star's core contracts and heats further — and ignites the next fuel. This repeats in a cascade: <em>carbon burning</em> makes neon, sodium, magnesium; <em>neon burning</em> and <em>oxygen burning</em> follow; finally <em>silicon burning</em> forges iron-group elements. Each stage requires a higher temperature, burns faster, and lasts a shorter time than the last — carbon burning might last centuries, silicon burning only days.</p>
      <h3>The onion-shell star</h3>
      <p>Because each fuel ignites in the hot center while the previous fuels still burn in shells farther out, the star develops a layered structure like an onion: hydrogen fusing in the outermost shell, then helium, carbon, neon, oxygen, silicon, and an iron core at the very center. This <em>nucleosynthesis</em> — the building of elements — is happening right now in the cores of massive stars across the galaxy.</p>
      <div class="aside"><b>You are made here:</b> the oxygen you breathe, the calcium in your bones, the iron in your blood — all were forged in the burning shells of massive stars (and in the explosions to come). This is the literal meaning of "we are made of star stuff." Day 80 will complete the thought by scattering these elements into space. But first, tomorrow, we hit a wall: iron.</div>
    `,
    takeaways:[
      "After carbon/oxygen, massive-star cores ignite successive fuels: carbon, neon, oxygen, then silicon burning.",
      "Each stage needs higher temperature, burns faster, and lasts a shorter time than the previous one.",
      "Fuels burn in shells around the hot center, giving the star an onion-like layered structure.",
      "This stellar nucleosynthesis forges the elements in living things — oxygen, calcium, iron-group, and more."
    ],
    refs:[
      {kind:"Stages",title:"Advanced nuclear burning in massive stars",desc:"The carbon, neon, oxygen, and silicon burning stages that build heavy elements.",url:"https://www.google.com/search?q=advanced+nuclear+burning+massive+star+carbon+silicon"},
      {kind:"Structure",title:"The onion-shell structure of a massive star",desc:"How concentric fusing shells layer a dying massive star down to an iron core.",url:"https://www.google.com/search?q=onion+shell+structure+massive+star+iron+core"},
    ],
    reflect:"Each successive burning stage in a massive star lasts a much shorter time than the one before. Given that heavier fuels release less energy per reaction yet the star's luminosity stays huge, why would the later stages get used up so quickly?"

  {
    title:"The Iron Catastrophe",
    big:"Iron is the ash that ends the fire — the one element a star cannot burn for profit, and the moment iron builds up in the core, the star is doomed.",
    recall:{q:"What layered structure does a massive star develop in its final burning stages, and what sits at the center?",
            a:"An onion-shell structure of successively heavier fusing shells, with an iron core forming at the very center."},
    body:`
      <p>Fusion has powered the star for its whole life by releasing energy — fusing light nuclei into heavier ones liberated binding energy (E = mc², Day 24). But this only works up to a point. Iron sits at the <em>peak of the nuclear binding energy curve</em>: it is the most tightly bound nucleus. Fusing iron into anything heavier <em>costs</em> energy rather than releasing it.</p>
      <h3>The fire goes out</h3>
      <p>So when the core becomes iron, the star's engine simply stops. There is no further fuel that can release energy to hold the core up. For a few hundred thousand years the iron core grows as the silicon shell dumps more iron onto it — until the core reaches the critical Chandrasekhar mass (about 1.4 solar masses, which we'll meet in Chapter 16) and can no longer support its own weight.</p>
      <h3>Collapse</h3>
      <p>With nothing to resist gravity, the iron core collapses — catastrophically. In a fraction of a second, an Earth-sized core implodes to a ball the size of a city. The temperatures get so extreme that the iron is torn apart (photodisintegration), undoing in an instant what took the star eons to build, and electrons are crushed into protons, removing pressure support and accelerating the collapse. The stage is set for one of the most violent events in the universe.</p>
      <div class="aside"><b>The binding-energy peak, revisited:</b> back on Day 24 we noted that E = mc² powers stars by converting mass to energy. Iron is where that bargain runs out. Light elements release energy when fused; heavy elements release energy when split (fission). Iron is the bottom of the valley — you can't extract energy from it either way. That single fact about one nucleus dictates how every massive star dies.</div>
    `,
    takeaways:[
      "Iron is the most tightly bound nucleus — at the peak of the binding-energy curve.",
      "Fusing iron consumes energy rather than releasing it, so an iron core cannot power the star.",
      "When the iron core exceeds ~1.4 solar masses (the Chandrasekhar mass), it can't support its weight.",
      "The core collapses catastrophically in under a second, with photodisintegration and electron capture removing support."

  {

    big:"The implosion of an iron core triggers the most violent explosion in the cosmos — a single dying star, for a few weeks, outshining an entire galaxy of billions.",
    recall:{q:"Why does an iron core collapse instead of continuing to fuse?",
            a:"Iron is the most tightly bound nucleus, so fusing it consumes energy; with no energy source, the core can't resist gravity and implodes."},
    body:`
      <p>The collapsing iron core falls inward at a quarter the speed of light — until it suddenly can't anymore. At nuclear densities, a new kind of pressure halts the collapse: the core's matter is crushed into neutrons, and <em>neutron degeneracy pressure</em> (Chapter 16) abruptly stiffens, slamming the brakes. The infalling core overshoots, compresses, and rebounds — sending a shock wave blasting back outward.</p>
      <h3>The neutrino bomb</h3>
      <p>The collapse releases a staggering amount of gravitational energy, the vast majority carried off by a flood of <em>neutrinos</em>. These ghostly particles barely interact with matter — yet so many pour out that they help blast the star's outer layers into space. The result is a <em>core-collapse supernova</em> (a Type II supernova): the star's envelope is hurled outward at thousands of kilometers per second, and for weeks the explosion can outshine its entire host galaxy.</p>
      <h3>What remains</h3>
      <p>At the center, the crushed core survives as an ultra-dense remnant — a <em>neutron star</em>, or, if massive enough, a <em>black hole</em> (both coming in Chapters 16–17). The explosion leaves an expanding <em>supernova remnant</em>, like the Crab Nebula, glowing for thousands of years.</p>
      <div class="aside"><b>Caught in the act — SN 1987A:</b> in 1987, a supernova erupted in a nearby galaxy, the closest in centuries. Hours <em>before</em> its light arrived, detectors on Earth caught a burst of neutrinos — direct confirmation of the neutrino-driven collapse mechanism. We watched the theory come true in real time. It remains one of the great triumphs of stellar astrophysics.</div>

      {kind:"Confirmation",title:"SN 1987A and the supernova neutrino burst",desc:"The nearby supernova whose neutrinos confirmed the core-collapse mechanism.",url:"https://www.google.com/search?q=SN+1987A+neutrino+detection+supernova"},

  {
    title:"Supernova Nucleosynthesis & Cosmic Recycling",
    big:"In the searing instant of explosion, a supernova forges the heaviest elements and scatters its entire enriched body across space — sowing the seeds of new stars, planets, and life.",

    body:`
      <p>The supernova does more than destroy the star — it creates. The explosion's extreme conditions drive a final burst of <em>nucleosynthesis</em>, and the blast disperses everything the star ever made.</p>
      <h3>Forging the heaviest elements</h3>
      <p>Fusion stopped at iron, so how do gold, silver, uranium, and the other heavy elements exist? They're built in extreme neutron-rich environments — the <em>r-process</em> (rapid neutron capture) — during the supernova and in related events like neutron-star mergers. Nuclei rapidly absorb neutrons and transform into the heaviest elements in the periodic table. The gold in a wedding ring was made this way.</p>
      <h3>Closing the great cosmic cycle</h3>
      <p>The supernova flings all of this — the oxygen, carbon, calcium, iron, and the freshly minted heavy elements — out into the interstellar medium (Day 61). There it enriches the gas clouds from which the next generation of stars and planets will form. The loop that opened this Part now closes: clouds make stars, stars forge elements, dying stars return enriched material to the clouds. Each generation of stars is built from the ashes of the last.</p>
      <div class="aside"><b>"We are stardust" — literally true:</b> almost every atom in your body heavier than hydrogen was forged inside a star and scattered by its death. The calcium in your bones, the iron in your blood, the oxygen you breathe — all are recycled stellar material. This isn't poetry; it's the direct consequence of the physics in this chapter. Next, Chapters 16–17 examine what the explosion leaves behind: the strange, dense corpses of stars.</div>

{ ch:16, title:"The Degenerate Remnants of Stars", days:[
  {
    title:"White Dwarfs — Earth-Sized Embers",
    big:"Pack the mass of the Sun into a ball the size of the Earth, and you get a white dwarf — the still-glowing ember left when a star like ours dies.",
    recall:{q:"What does a Sun-like star leave behind after shedding its envelope as a planetary nebula?",
            a:"A bare, cooling carbon-oxygen core — a white dwarf."},
    body:`
      <p>We met the white dwarf as the endpoint of a Sun-like star (Day 69). Now we examine it properly, because it's one of the strangest objects physics allows. A <em>white dwarf</em> is the exposed core of a dead low-mass star: typically about 0.6 solar masses crammed into a sphere roughly the size of Earth. That makes its density staggering — a sugar-cube of white-dwarf matter would weigh about a tonne.</p>
      <h3>An old acquaintance</h3>
      <p>We've actually known one since Day 37: Sirius B, the faint companion whose gravitational tug betrayed it, turned out to be a white dwarf — hot, tiny, and absurdly dense. Its very existence puzzled astronomers: what holds up an object that has no fusion to support it against gravity? An ordinary gas would just keep collapsing.</p>
      <h3>The puzzle of support</h3>
      <p>A white dwarf no longer fuses anything — its fire is out. With no energy generation, the thermal pressure that held up the living star is gone. Yet white dwarfs are stable, not collapsing. Something other than heat must be holding them up. The answer is a purely quantum-mechanical pressure — and it's the subject of tomorrow's lesson. It's one of the most beautiful places where the quantum world (Part I) reaches up to govern an entire astronomical object.</p>
      <div class="aside"><b>Hot, but cooling forever:</b> a freshly exposed white dwarf is extremely hot (it's a star's former core), which is why it's "white." But with no fuel, it can only cool and fade over billions of years, eventually becoming a cold, dark cinder. The universe isn't old enough yet for any white dwarf to have fully cooled — so the oldest ones are also cosmic clocks, another way to date stellar populations.</div>
    `,
    takeaways:[
      "A white dwarf is the exposed core of a dead low-mass star: ~0.6 solar masses in an Earth-sized sphere.",
      "Its density is enormous (a sugar-cube would weigh ~a tonne).",
      "Sirius B (from Day 37) is a nearby example — its existence raised the question of what supports it.",
      "With no fusion, a white dwarf only cools and fades over billions of years; held up by non-thermal pressure."

  {
    title:"Electron Degeneracy Pressure",
    big:"What holds up a white dwarf is not heat or fusion, but a stubborn quantum rule: no two electrons will share the same state, and their refusal creates a pressure nothing can switch off.",
    recall:{q:"What is the unresolved puzzle about white dwarfs from yesterday?",
            a:"With no fusion and no thermal pressure, what stops them from collapsing under gravity? Something non-thermal must support them."},
    body:`
      <p>The answer comes straight from quantum mechanics — the same revolution we met in Part I (the uncertainty principle and wave nature of matter, Day 29). It rests on the <em>Pauli exclusion principle</em>: no two electrons can occupy the same quantum state at once.</p>
      <h3>A pressure from crowding</h3>
      <p>Squeeze matter hard enough and electrons are forced close together. But they can't all pile into the lowest-energy states — exclusion forbids it — so they're forced into higher and higher momentum states. Fast-moving electrons exert pressure, even at zero temperature. This is <em>electron degeneracy pressure</em>: a pressure that arises purely from the quantum refusal of electrons to be crammed into the same state, with no help from heat at all.</p>
      <h3>Why it changes everything</h3>
      <p>This is what holds up a white dwarf. And it behaves utterly unlike ordinary gas pressure: it doesn't depend on temperature, so the star can cool indefinitely without losing its support. Counterintuitively, a more massive white dwarf is <em>smaller</em> — more gravity squeezes it into a denser, tinier ball. That strange inverse relationship between mass and size hints at a limit: pile on too much mass and something has to give. That limit is tomorrow's subject.</p>
      <div class="aside"><b>The quantum world, writ large:</b> the exclusion principle is usually a rule about electrons in atoms — it's why the periodic table has structure, why matter is solid. Here, that same microscopic rule holds up an entire star against the crushing weight of a Sun's worth of mass. The very small and the very large meet in a white dwarf.</div>
    `,
    takeaways:[
      "White dwarfs are supported by electron degeneracy pressure, rooted in the Pauli exclusion principle.",
      "Forced together, electrons must occupy higher momentum states, creating pressure even at zero temperature.",
      "Unlike gas pressure, degeneracy pressure doesn't depend on temperature — so the star can cool without collapsing.",
      "More massive white dwarfs are smaller (denser) — an inverse mass–radius relation that hints at a mass limit."
    ],
    refs:[
      {kind:"Quantum",title:"Electron degeneracy pressure",desc:"How the Pauli exclusion principle creates a temperature-independent pressure that supports white dwarfs.",url:"https://www.google.com/search?q=electron+degeneracy+pressure+Pauli+exclusion+white+dwarf"},
      {kind:"Strange",title:"The white dwarf mass–radius relation",desc:"Why a heavier white dwarf is actually smaller than a lighter one.",url:"https://www.google.com/search?q=white+dwarf+mass+radius+relation+inverse"},
    ],
    reflect:"Electron degeneracy pressure doesn't depend on temperature. Why is that property exactly what a white dwarf needs, given that it has no fuel and is doomed to cool down over time?"

  {
    title:"The Chandrasekhar Limit",
    big:"There is a maximum mass a white dwarf can be — about 1.4 Suns — and a teenager on a long sea voyage worked it out, to the fury of the era's greatest astronomer.",
    recall:{q:"What property of electron degeneracy pressure lets a white dwarf stay stable as it cools?",
            a:"It's independent of temperature — so the star keeps its support even with no heat source, unlike thermal gas pressure."},
    body:`
      <p>Electron degeneracy pressure is strong, but not infinitely so. As you add mass to a white dwarf, gravity squeezes it smaller and the electrons are forced to ever-higher speeds — approaching the speed of light. Once they're relativistic, the pressure can no longer keep up with gravity's demands. There's a hard ceiling.</p>
      <h3>1.4 solar masses</h3>
      <p>That ceiling is the <em>Chandrasekhar limit</em>: about 1.4 times the Sun's mass. A white dwarf cannot exist above it — degeneracy pressure simply cannot support more. Below the limit, the star is stable forever. At the limit, it's on the brink of catastrophe.</p>
      <h3>The story behind it</h3>
      <p>Subrahmanyan Chandrasekhar derived this in 1930, at age 19, during the boat journey from India to England. When he presented it, the towering Sir Arthur Eddington publicly ridiculed the idea that a star could have no stable endpoint. Chandrasekhar was right; he later won the Nobel Prize. The limit bearing his name is one of the most important numbers in astrophysics.</p>
      <div class="aside"><b>Why the limit is dynamite:</b> a lone white dwarf below 1.4 solar masses just cools quietly. But push one <em>toward</em> the limit — for instance, by dumping mass onto it from a companion star — and you trigger one of the most important explosions in the universe, a Type Ia supernova. That's tomorrow. The Chandrasekhar limit is the trigger, and a single, precise mass means every such explosion is nearly identical — a fact that will reshape cosmology.</div>
    `,
    takeaways:[
      "There's a maximum white-dwarf mass — the Chandrasekhar limit, about 1.4 solar masses.",
      "Above it, electrons become relativistic and degeneracy pressure can't resist gravity.",
      "Chandrasekhar derived it at 19 (1930); Eddington publicly opposed it, but Chandrasekhar was vindicated (and won the Nobel).",
      "Pushing a white dwarf toward the limit triggers a Type Ia supernova — a precise, repeatable explosion."
    ],
    refs:[
      {kind:"Limit",title:"The Chandrasekhar limit",desc:"The maximum mass a white dwarf can have, and why it exists.",url:"https://www.google.com/search?q=Chandrasekhar+limit+1.4+solar+masses+white+dwarf"},
      {kind:"History",title:"Chandrasekhar vs. Eddington",desc:"The story of a young scientist's correct insight and a famous public dispute.",url:"https://www.google.com/search?q=Chandrasekhar+Eddington+dispute+white+dwarf+limit"},
    ],
    reflect:"As mass is added to a white dwarf it shrinks and its electrons speed up toward light-speed. Why would electrons being unable to exceed the speed of light impose a hard ceiling on how much mass degeneracy pressure can support?"

  {
    title:"Type Ia Supernovae — Standard Candles from White Dwarfs",
    big:"Feed a white dwarf too much and it detonates as a thermonuclear bomb of near-identical brightness every time — a property that let astronomers measure the universe's expansion.",
    recall:{q:"What is the Chandrasekhar limit, and what happens as a white dwarf approaches it?",
            a:"~1.4 solar masses, the max a white dwarf can be; approaching it (e.g., by accreting mass) destabilizes it and can trigger a supernova."},
    body:`
      <p>A white dwarf in a binary system can siphon material off its companion (close binaries are Chapter 18's topic). As mass piles on and the dwarf is pushed toward the Chandrasekhar limit, its center reaches the temperature for runaway carbon fusion. Because the star is degenerate, it can't expand to relieve the heat — so the fusion runs away explosively, and the entire white dwarf detonates as a <em>Type Ia supernova</em>, blowing itself completely apart.</p>
      <h3>Why they're nearly identical</h3>
      <p>Here's the magic: because a Type Ia always detonates at essentially the same mass (the Chandrasekhar limit), these explosions all release nearly the <em>same</em> amount of energy and reach nearly the <em>same</em> peak luminosity. They're a superb <em>standard candle</em> — and far brighter than Cepheids (Day 72), so they're visible across enormous distances, in galaxies billions of light-years away.</p>
      <h3>How they remade cosmology</h3>
      <p>In the 1990s, two teams used Type Ia supernovae to measure how fast the universe's expansion was changing — expecting it to be slowing under gravity. Instead they found the expansion is <em>accelerating</em>, driven by a mysterious "dark energy." It earned the 2011 Nobel Prize and upended cosmology. A dying white dwarf became a tool to weigh the fate of the universe.</p>
      <div class="aside"><b>Two kinds of supernova, two origins:</b> don't confuse them. A Type II (Day 79) is the core collapse of a single massive star — it has hydrogen lines. A Type Ia is the thermonuclear detonation of a white dwarf in a binary — no hydrogen, and a uniform brightness. They look superficially similar but come from completely different stars and physics. The white dwarf's precise mass limit is what makes Type Ia the universe's best long-range ruler.</div>
    `,
    takeaways:[
      "A white dwarf accreting mass toward the Chandrasekhar limit can undergo runaway carbon fusion and detonate entirely — a Type Ia supernova.",

      {kind:"Cosmology",title:"Type Ia supernovae and dark energy",desc:"How standard-candle supernovae revealed the accelerating universe.",url:"https://www.google.com/search?q=type+Ia+supernova+dark+energy+accelerating+universe"},
    ],
    reflect:"Type Ia supernovae make better long-distance standard candles than Cepheids in two ways: brightness and uniformity. Why does detonating at a fixed mass (the Chandrasekhar limit) give them such consistent peak luminosity?"

  {
    title:"Neutron Stars — A City-Sized Sun",
    big:"When a stellar core is too heavy even for electron degeneracy, gravity crushes its atoms out of existence, leaving a ball of pure neutrons the size of a city.",
    recall:{q:"What supports a white dwarf, and what is the maximum mass it can reach?",
            a:"Electron degeneracy pressure; the maximum is the Chandrasekhar limit, ~1.4 solar masses."},
    body:`
      <p>What happens when a collapsing core exceeds the Chandrasekhar limit — as in the core-collapse supernova of Day 79? Electron degeneracy pressure fails. Gravity crushes the electrons <em>into</em> the protons, merging them into neutrons (releasing that flood of neutrinos we met in the supernova). The result is an object made almost entirely of neutrons: a <em>neutron star</em>.</p>
      <h3>Density beyond imagining</h3>
      <p>A neutron star packs more than the Sun's mass into a sphere only about 20 kilometers across — the size of a city. Its density rivals that of an atomic nucleus: a single teaspoon of neutron-star material would weigh billions of tonnes, as much as a mountain. It is, essentially, one colossal atomic nucleus held together by gravity.</p>
      <h3>What holds it up</h3>
      <p>A neutron star is supported by <em>neutron degeneracy pressure</em> — the same quantum exclusion principle as in white dwarfs (Day 82), but now applied to neutrons instead of electrons. This is the very pressure that halted the supernova core collapse and caused the rebound (Day 79). And just as white dwarfs have the Chandrasekhar limit, neutron stars have their own maximum mass — beyond which not even neutron degeneracy can win, and gravity's ultimate victory awaits in Chapter 17.</p>
      <div class="aside"><b>A ladder of last stands:</b> notice the pattern. A normal star resists gravity with heat. A white dwarf, when the heat fails, resists with electron degeneracy. A neutron star, when even that fails, resists with neutron degeneracy. Each is a denser, more extreme last stand against collapse. There's one rung left — and at that rung, gravity finally wins completely. That's the black hole, next chapter.</div>
    `,
    takeaways:[

      {kind:"Support",title:"Neutron degeneracy pressure",desc:"The quantum pressure that holds up a neutron star, and its mass limit.",url:"https://www.google.com/search?q=neutron+degeneracy+pressure+neutron+star+mass+limit"},

{ ch:17, title:"General Relativity & Black Holes", days:[
  {
    title:"Pulsars — Cosmic Lighthouses",
    big:"A graduate student found a radio signal ticking so precisely it was nicknamed 'Little Green Men' — but it was something stranger: a spinning neutron star sweeping a beam across the galaxy.",
    recall:{q:"How does a neutron star form, and what supports it?",
            a:"In a core collapse exceeding the Chandrasekhar limit, electrons merge with protons into neutrons; it's supported by neutron degeneracy pressure."},
    body:`
      <p>For a while, neutron stars were just theory — until 1967, when Jocelyn Bell Burnell, a graduate student, detected an astonishingly regular radio pulse from the sky, ticking every 1.3 seconds. It was so precise it was half-jokingly labeled "LGM-1" for "Little Green Men." The real explanation was a <em>pulsar</em>: a rapidly spinning neutron star.</p>
      <h3>The lighthouse model</h3>
      <p>A neutron star inherits two things from its collapse, both dialed up to extremes. By conservation of angular momentum (the skater again, Day 63), the collapsed core spins blisteringly fast — some pulsars rotate hundreds of times per second. And the magnetic field, compressed with the core, becomes trillions of times stronger than Earth's. This field channels beams of radiation out of the magnetic poles. If a beam happens to sweep across Earth as the star rotates, we see a pulse with each rotation — like a lighthouse. The clock-like regularity is just the neutron star's spin.</p>
      <h3>Why this matters</h3>
      <p>Pulsars confirmed neutron stars are real, not just math. They're also fantastically precise natural clocks, and timing them has tested physics to extraordinary accuracy — including, as we'll see, the predictions of general relativity. The discovery is also famous for a snub: the Nobel Prize went to Bell Burnell's supervisor, not to her.</p>
      <div class="aside"><b>From remnant to laboratory:</b> the neutron star of Chapter 16 was an endpoint. As a pulsar, it becomes an instrument — a spinning, magnetized clock we can use to probe gravity itself. That sets up the leap this chapter makes: from Newton's gravity, which has carried us all book long, to Einstein's deeper theory, which we need to understand the most extreme objects of all.</div>
    `,
    takeaways:[
      "Pulsars are rapidly spinning neutron stars, discovered by Jocelyn Bell Burnell in 1967 (first dubbed 'LGM-1').",
      "Collapse spins the core up (angular momentum) and amplifies its magnetic field enormously.",
      "Beams from the magnetic poles sweep around like a lighthouse; we see a pulse each rotation.",
      "Pulsars proved neutron stars are real and serve as ultra-precise natural clocks for testing physics."
    ],
    refs:[
      {kind:"Discovery",title:"Jocelyn Bell Burnell and the discovery of pulsars",desc:"The detection of the first pulsar and the story behind it.",url:"https://www.google.com/search?q=Jocelyn+Bell+Burnell+pulsar+discovery+LGM"},
      {kind:"Model",title:"How pulsars work (the lighthouse model)",desc:"Why a spinning, magnetized neutron star produces clock-like radio pulses.",url:"https://www.google.com/search?q=pulsar+lighthouse+model+rotating+neutron+star"},
    ],
    reflect:"A pulsar's pulses are extraordinarily regular because they come from the star's rotation. Why would a spinning beam produce a 'pulse' to a fixed observer, and what everyday object works on exactly the same principle?"
  },
  {
    title:"General Relativity — Gravity as Curved Spacetime",
    big:"Einstein replaced Newton's invisible force with a radical idea: mass bends the very fabric of space and time, and what we call gravity is just things following the curves.",
    recall:{q:"What inherited properties make a young neutron star a pulsar?",
            a:"Extremely fast rotation (from angular-momentum conservation in collapse) and an enormously amplified magnetic field, beaming radiation like a lighthouse."},
    body:`
      <p>All book long we've used Newton's gravity (Day 10) — a force pulling masses together. It works beautifully for orbits and tides. But near the extreme objects of this chapter, it breaks down. To go further we need Einstein's <em>general relativity</em> (1915), which extends the special relativity we met in Part I (Day 22).</p>
      <h3>The core idea</h3>
      <p>General relativity reimagines gravity entirely. Mass and energy <em>curve</em> the four-dimensional fabric of spacetime, and objects simply follow the straightest possible paths through that curved geometry. The classic image: a heavy ball on a stretched rubber sheet makes a dip, and a rolling marble curves around it — not pulled by a force, but following the warped surface. As the physicist John Wheeler put it, matter tells spacetime how to curve, and spacetime tells matter how to move.</p>
      <h3>How we know it's right</h3>
      <p>General relativity makes testable predictions that Newton's gravity doesn't. It correctly explained a long-standing wobble in Mercury's orbit. It predicted that gravity <em>bends light</em> — confirmed in 1919 when starlight was seen to deflect around the Sun during an eclipse, making Einstein world-famous overnight. And it predicts that time runs slower in stronger gravity — <em>gravitational time dilation</em> — which is real and measurable (your GPS depends on correcting for it).</p>
      <div class="aside"><b>Why we needed the upgrade now:</b> for ordinary stars and planets, Newton's gravity is an excellent approximation and we never needed more. But neutron stars and black holes warp spacetime so severely that only general relativity describes them correctly. To understand what happens when gravity truly wins — the next lesson — Newton is no longer enough.</div>
    `,
    takeaways:[
      "General relativity (Einstein, 1915) recasts gravity as the curvature of spacetime, not a force.",
      "Mass and energy curve spacetime; objects follow the straightest paths through that curved geometry.",
      "Confirmed predictions: Mercury's orbital precession, the bending of starlight (1919 eclipse), and gravitational time dilation (used in GPS).",
      "Newtonian gravity suffices for ordinary objects, but extreme remnants require general relativity."
    ],
    refs:[
      {kind:"Theory",title:"General relativity explained",desc:"Einstein's picture of gravity as curved spacetime, and how it differs from Newton's force.",url:"https://www.google.com/search?q=general+relativity+curved+spacetime+explained"},
      {kind:"Tests",title:"Classic tests of general relativity",desc:"Mercury's orbit, the bending of starlight, and gravitational time dilation.",url:"https://www.google.com/search?q=tests+of+general+relativity+mercury+light+bending+time+dilation"},
    ],
    reflect:"Newton described gravity as a force acting at a distance; Einstein described it as curved spacetime. For everyday situations like a falling apple, both give the same answer. Why, then, did physicists need general relativity at all — what kinds of situations reveal the difference?"
  },
  {
    title:"Black Holes — When Gravity Wins",
    big:"Pile too much mass into a remnant and nothing can hold it up — it collapses without limit, warping spacetime so severely that not even light can escape.",
    recall:{q:"How does general relativity describe gravity, and why is it needed for the densest objects?",
            a:"As the curvature of spacetime by mass and energy; extreme remnants warp spacetime so strongly that only general relativity describes them correctly."},
    body:`
      <p>We left a cliffhanger on Day 85: what happens to a stellar core too massive even for neutron degeneracy pressure? Following our ladder of last stands, there's nothing left to resist gravity. The core collapses without limit, forming a <em>black hole</em> — a region where gravity has won completely.</p>
      <h3>The event horizon</h3>

      const done=STATE.done.includes(day.n);
      const active=day.n===activeDay;
      h+=`<div class="day ${active?'active':''} ${done?'done':''} ${day.full?'':'locked'}" onclick="goDay(${day.n})">
        <span class="tick"></span>
        <span class="dn">D${day.n}</span>
        <span>${day.title}</span>
      </div>`;
    });
    h+=`</div></div>`;
  });
  if(lastPart!==null) h+=`</div></div>`;                 // close final part
  list.innerHTML=h;
}
function togglePart(p){ const el=document.getElementById('partwrap-'+p); if(el) el.classList.toggle('open'); }
function toggleCh(ch){ const el=$('#chdays-'+ch); el.classList.toggle('open'); }

function renderProgress(){
  const pct=Math.round(STATE.done.length/TOTAL*100);
  $('#pbar').style.width=pct+'%';
  // streak = number of consecutively completed days from day 1
  let streak=0; for(let i=1;i<=TOTAL;i++){ if(STATE.done.includes(i)) streak++; else break; }
  $('#streak').textContent = streak>0 ? `${streak}-lesson streak · ${pct}% of Part I` : `Begin Part I · ${TOTAL} lessons`;
}

function renderLesson(){
  const d=DAYS.find(x=>x.n===activeDay);
  const stage=$('#stage');
  if(!d.full){
    stage.innerHTML=`<div class="card"><div class="card-pad stub">
      <div class="eyebrow" style="justify-content:center"><span class="pill">Chapter ${d.ch}</span> Day ${d.n} · ${d.chTitle}</div>
      <div class="big">${d.title}</div>
      <p>${d.teaser}</p>
      <p style="margin-top:22px;font-style:italic;color:var(--gold-soft)">This lesson is mapped but not yet written. Chapter 1 is complete — ask Claude to write this one out next.</p>
      <div class="navrow" style="justify-content:center;margin-top:26px">
        <button class="btn ghost" onclick="goDay(${Math.max(1,d.n-1)})">← Previous</button>
        <button class="btn ghost" onclick="goDay(${Math.min(TOTAL,d.n+1)})">Next →</button>
      </div>
    </div></div>`;
    return;
  }
  const done=STATE.done.includes(d.n);
  let recallHTML='';
  if(d.recall){
    recallHTML=`<div class="recall">
      <div class="lab">◷ Recall — building on what you know</div>
      <p class="q">${d.recall.q}</p>
      <details><summary>Reveal the answer</summary><div class="a">${d.recall.a}</div></details>
    </div>`;
  }
  const take=d.takeaways.map((t,i)=>`<li><span class="s">${String(i+1).padStart(2,'0')}</span><span>${t}</span></li>`).join('');
  const refs=d.refs.map(r=>`<a class="ref" href="${r.url}" target="_blank" rel="noopener">
      <div class="rk">${r.kind}</div><div class="rt">${r.title}</div><div class="rd">${r.desc}</div></a>`).join('');
  stage.innerHTML=`<div class="card"><div class="card-pad">
    <div class="eyebrow"><span class="pill">Day ${d.n}</span> Chapter ${d.ch} · ${d.chTitle}</div>
    <h1 class="title">${d.title}</h1>
    <p class="bigidea">${d.big}</p>
    ${recallHTML}
    <div class="lesson">${d.body}</div>
    <div class="takeaways"><div class="sec-lab">Carry these forward</div><ul>${take}</ul></div>
    <div class="refs"><div class="sec-lab">Go further tonight</div>${refs}</div>
    <div class="reflect"><div class="sec-lab">★ Before you sleep</div><p>${d.reflect}</p></div>
    <div class="footer">
      <button class="btn primary ${done?'done':''}" id="markbtn" onclick="toggleDone(${d.n})">${done?'✓ Completed':'Mark complete'}</button>
      <div class="navrow">
        <button class="btn ghost" onclick="goDay(${Math.max(1,d.n-1)})" ${d.n===1?'disabled style=opacity:.4':''}>← Previous</button>
        <button class="btn ghost" onclick="goDay(${Math.min(TOTAL,d.n+1)})">Next lesson →</button>
      </div>
    </div>
  </div></div>`;
}

function goDay(n){ activeDay=n; STATE.current=n; save(STATE); renderMap(); renderLesson(); window.scrollTo({top:0,behavior:'smooth'}); }
async function toggleDone(n){
  if(STATE.done.includes(n)) STATE.done=STATE.done.filter(x=>x!==n);
  else STATE.done.push(n);
  await save(STATE); renderMap(); renderProgress(); renderLesson();
}

(async function init(){
  STATE=await load();
  if(!STATE.done) STATE.done=[];
  activeDay = STATE.current || 1;
  renderMap(); renderProgress(); renderLesson();
})();
</script>
