<style>
  :root{
    --ink:#f3ecdc;          /* parchment text on dark */
    --ink-soft:#c8bfa9;
    --ink-faint:#8a8170;
    --night:#0a0e1a;        /* deep night */
    --night-2:#10162a;
    --panel:#141b30;
    --panel-2:#1b243f;
    --line:#2a3656;
    --gold:#e7b85c;         /* starlight / brass */
    --gold-soft:#c9923a;
    --teal:#6fd0c0;
    --rose:#e08a7a;
    --paper:#f7f1e3;        /* reading surface */
    --paper-ink:#221d14;
    --paper-soft:#5b5341;
    --paper-line:#e0d7c2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--night);
    color:var(--ink);
    font-family:"Newsreader",Georgia,serif;
    font-size:18px;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* ---------- starfield ---------- */
  .sky{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1200px 700px at 78% -10%, #1a2banner 0, transparent 60%),
      radial-gradient(900px 600px at 10% 110%, #14203a 0, transparent 55%),
      linear-gradient(180deg,#0a0e1a 0%, #0c1224 55%, #0a0e1a 100%);
  }
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .stars i{position:absolute;background:#fff;border-radius:50%;opacity:.0;
    animation:tw var(--d,4s) ease-in-out infinite var(--delay,0s)}
  @keyframes tw{0%,100%{opacity:.06}50%{opacity:var(--mx,.8)}}
  /* ---------- shell ---------- */
  .wrap{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:28px 22px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:10px}
  .brand{display:flex;align-items:baseline;gap:14px}
  .mark{font-family:"Fraunces",serif;font-weight:900;font-size:30px;letter-spacing:-.5px;color:var(--ink)}
  .mark .dot{color:var(--gold)}
  .sub{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-faint)}
  .streak{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:1px;color:var(--gold);
    border:1px solid var(--line);border-radius:999px;padding:7px 14px;background:rgba(231,184,92,.06)}
  .progressbar{height:3px;background:var(--line);border-radius:9px;margin:18px 0 26px;overflow:hidden}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));width:0;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .layout{display:grid;grid-template-columns:300px 1fr;gap:30px;align-items:start}
  @media(max-width:880px){.layout{grid-template-columns:1fr}}

  /* ---------- course map ---------- */
  .map{position:sticky;top:18px}
  @media(max-width:880px){.map{position:static}}
  .map h4{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--ink-faint);margin:0 0 12px}
  .part-wrap{margin-bottom:4px}
  .part-head{display:flex;align-items:center;gap:8px;cursor:pointer;
    font-family:"Space Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold-soft);margin:16px 0 9px;padding:5px 4px 6px;border-bottom:1px solid var(--line);opacity:.9;
    transition:opacity .2s}
  .part-head:hover{opacity:1}
  .part-wrap:first-child .part-head{margin-top:0}
  .part-caret{display:inline-block;font-size:9px;color:var(--gold-soft);transition:transform .25s ease;flex:0 0 auto}
  .part-wrap.open .part-caret{transform:rotate(90deg)}
  .part-label{flex:1}
  .part-count{font-size:9px;opacity:.6;letter-spacing:1px}
  .part-body{overflow:hidden;max-height:0;transition:max-height .4s ease}
  .part-wrap.open .part-body{max-height:6000px}
  .chapter{margin-bottom:6px}
  .chapter > .ch-head{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 8px;border-radius:9px;
    color:var(--ink-soft);transition:.2s}
  .chapter > .ch-head:hover{background:var(--panel)}
  .ch-num{font-family:"Space Mono",monospace;font-size:11px;color:var(--gold-soft);min-width:22px}
  .ch-title{font-size:15px;font-weight:500}
  .ch-days{overflow:hidden;max-height:0;transition:max-height .35s ease}
  .ch-days.open{max-height:900px}
  .day{display:flex;align-items:center;gap:10px;padding:7px 8px 7px 30px;border-radius:8px;cursor:pointer;
    color:var(--ink-faint);font-size:14.5px;transition:.18s;border-left:2px solid transparent}
  .day:hover{background:var(--panel);color:var(--ink-soft)}
  .day.active{background:var(--panel-2);color:var(--ink);border-left-color:var(--gold)}
  .day.done{color:var(--ink-soft)}
  .tick{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
  .day.done .tick{background:var(--gold);border-color:var(--gold)}
  .day.done .tick:after{content:"";width:5px;height:9px;border:solid var(--night);border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px)}
  .day .dn{font-family:"Space Mono",monospace;font-size:10px;opacity:.6}
  .locked{opacity:.45}

  /* ---------- lesson card ---------- */
  .card{background:var(--paper);color:var(--paper-ink);border-radius:18px;overflow:hidden;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04);
    animation:rise .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .card-pad{padding:38px 44px 40px}
  @media(max-width:560px){.card-pad{padding:26px 22px 30px}}
  .eyebrow{display:flex;align-items:center;gap:12px;font-family:"Space Mono",monospace;font-size:11px;
    letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft)}
  .eyebrow .pill{background:var(--paper-line);color:var(--paper-soft);border-radius:999px;padding:3px 10px;letter-spacing:1.5px}
  h1.title{font-family:"Fraunces",serif;font-weight:600;font-size:38px;line-height:1.08;letter-spacing:-.6px;margin:14px 0 6px}
  @media(max-width:560px){h1.title{font-size:29px}}
  .bigidea{font-family:"Newsreader",serif;font-style:italic;font-size:20px;color:var(--paper-soft);margin:0 0 26px;
    border-left:3px solid var(--gold);padding-left:16px}

  .recall{background:#fbf6ea;border:1px dashed var(--gold-soft);border-radius:12px;padding:16px 18px;margin:0 0 30px}
  .recall .lab{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .recall .q{font-size:16.5px;margin:0}
  .recall details{margin-top:9px}
  .recall summary{cursor:pointer;font-family:"Space Mono",monospace;font-size:12px;color:var(--paper-soft);list-style:none}
  .recall summary::-webkit-details-marker{display:none}
  .recall summary:before{content:"▸ ";color:var(--gold-soft)}
  .recall details[open] summary:before{content:"▾ "}
  .recall .a{font-size:15.5px;color:var(--paper-soft);margin-top:6px}

  .lesson{font-size:18px}
  .lesson p{margin:0 0 17px}
  .lesson h3{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:30px 0 10px;letter-spacing:-.3px}
  .lesson em{color:var(--paper-soft)}
  .lesson .eq{font-family:"Space Mono",monospace;background:#f0e9d6;border-radius:8px;padding:11px 14px;margin:18px 0;
    font-size:15px;text-align:center;color:#3a3122;overflow-x:auto}
  .lesson .aside{background:#f0e9d6;border-radius:10px;padding:14px 18px;margin:20px 0;font-size:16px;color:var(--paper-soft)}
  .lesson .aside b{color:var(--paper-ink)}

  .takeaways{margin:30px 0 4px}
  .sec-lab{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:12px}
  .takeaways ul{list-style:none;padding:0;margin:0}
  .takeaways li{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--paper-line);font-size:16.5px}
  .takeaways li:last-child{border-bottom:none}
  .takeaways li .s{color:var(--gold-soft);font-family:"Space Mono",monospace;font-size:13px;flex:0 0 auto}

  .refs{margin-top:30px}
  .ref{display:block;text-decoration:none;color:inherit;background:#fbf6ea;border:1px solid var(--paper-line);border-radius:12px;
    padding:14px 16px;margin-bottom:10px;transition:.2s}
  .ref:hover{border-color:var(--gold-soft);transform:translateY(-1px);box-shadow:0 8px 24px -12px rgba(0,0,0,.3)}
  .ref .rk{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft)}
  .ref .rt{font-weight:500;font-size:16.5px;margin:3px 0}
  .ref .rd{font-size:15px;color:var(--paper-soft)}

  .reflect{margin-top:30px;background:#161d33;color:var(--ink);border-radius:12px;padding:20px 22px}
  .reflect .sec-lab{color:var(--gold)}
  .reflect p{margin:0;font-size:17px;font-style:italic;color:var(--ink-soft)}

  .footer{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:34px;flex-wrap:wrap}
  .btn{font-family:"Space Mono",monospace;font-size:13px;letter-spacing:1px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;transition:.2s}
  .btn.primary{background:var(--gold);color:#231a07;font-weight:700}
  .btn.primary:hover{background:var(--gold-soft)}
  .btn.primary.done{background:#dfe7d6;color:#3a4a2c}
  .btn.ghost{background:transparent;color:var(--paper-soft);border:1px solid var(--paper-line)}
  .btn.ghost:hover{border-color:var(--gold-soft);color:var(--paper-ink)}
  .navrow{display:flex;gap:10px}

  .stub{text-align:center;padding:50px 30px}
  .stub .big{font-family:"Fraunces",serif;font-size:30px;margin:10px 0}
  .stub p{color:var(--paper-soft);max-width:440px;margin:0 auto}
</style>

<script>
/* =========================================================
   CURRICULUM — Part I of Carroll & Ostlie
   Chapter 1 is written in full. Ch 2–6 are mapped as stubs.
   ========================================================= */
const CURRICULUM = [
{ ch:1, title:"The Celestial Sphere", days:[
  {
    title:"The Great Illusion",
    big:"Every star you can see sits at a different, unimaginable distance — yet for thousands of years it paid to pretend they were all glued to one dome.",
    recall:null,
    body:`
      <p>Walk outside tonight and look up. Your eye reports something completely false: that the stars are points of light fixed to the inside of a dark dome, all the same distance away, slowly turning overhead. This is wrong — Betelgeuse is roughly 50,000 times farther than the nearest star to the Sun — and yet this "wrong" picture is one of the most powerful tools in astronomy. We call it the <em>celestial sphere</em>.</p>
      <p>The trick is that distance is exactly the information your eye throws away. When you can't tell near from far, all that's left is <em>direction</em>. And direction is enough to do an astonishing amount of work: to predict where a planet will be next month, to time the seasons, to navigate an ocean. So astronomers made a deliberate bargain — surrender depth, keep direction — and projected the entire universe onto an imaginary sphere of infinite radius centered on the observer.</p>
      <h3>Why a sphere, of all shapes?</h3>
      <p>Because the only thing two stars in the same direction share is an <em>angle</em> from you. A sphere is the natural home of angles. Once everything is a point on a sphere, "how far apart are those two stars in the sky?" becomes a clean geometry problem measured in degrees, not light-years.</p>
      <div class="aside"><b>A feel for the scale:</b> the full sky is 360° around and the Moon is about ½° wide. The bowl of the Big Dipper spans roughly 10°. Hold your fist at arm's length — that's about 10° too. You are already carrying a rough protractor.</div>
      <p>Here's the subtle part that trips people up: the celestial sphere is centered on <em>you</em>, the observer. Move to the other side of the Earth and your dome is different. But because the stars are so absurdly far away, the Earth's whole width is negligible — so to good approximation, everyone on Earth shares the same celestial sphere. We'll see later (in Chapter 3) that this approximation breaks down in a beautiful, useful way: the tiny shift you <em>can</em> measure is called parallax, and it's how we got our first real distances.</p>
    `,
    takeaways:[
      "The celestial sphere is a model that keeps direction and discards distance.",
      "Positions on it are measured as angles (degrees), not lengths.",
      "It's centered on the observer, but stars are so far that everyone shares ~the same sphere."
    ],
    refs:[
      {kind:"Free software",title:"Stellarium",desc:"A free planetarium for your computer. Set your location, hit play, and watch the celestial sphere turn. Nothing builds intuition faster.",url:"https://stellarium.org/"},
      {kind:"Book",title:"H. A. Rey — The Stars: A New Way to See Them",desc:"Yes, the Curious George author. The clearest, friendliest introduction to the sky ever drawn.",url:"https://www.google.com/search?q=H.+A.+Rey+The+Stars+A+New+Way+to+See+Them"},
    ],
    reflect:"Pick one bright star tonight. Without any tool, estimate how many 'fists' it sits above the horizon. You've just measured an altitude — tomorrow you'll learn the name for it."
  },
  {
    title:"Where You Stand: the Horizon System",
    big:"The most honest way to point at a star is to say how high it is and which way to turn — altitude and azimuth.",
    recall:{q:"Yesterday: what two pieces of information does the celestial sphere keep, and what does it throw away?",
            a:"It keeps direction (angles), and throws away distance. That's why everything can live on one sphere."},
    body:`
      <p>Suppose a friend phones and says "look, there's something bright up there!" Useless — until they tell you <em>where</em>. The simplest coordinate system answers two questions a body can answer standing in one spot: <em>how high?</em> and <em>which compass direction?</em></p>
      <h3>Altitude and azimuth</h3>
      <p><em>Altitude</em> is the angle of an object above your horizon: 0° at the horizon, 90° straight overhead. That overhead point has a name worth knowing — the <em>zenith</em> — and the point directly beneath your feet is the <em>nadir</em>.</p>
      <p><em>Azimuth</em> is the compass bearing, measured around the horizon: by convention 0° = due North, 90° = East, 180° = South, 270° = West. Together, (altitude, azimuth) pin down any direction in the sky from where you stand.</p>
      <div class="aside"><b>The catch — and it's a big one:</b> this system is glued to <em>you</em> and to <em>now</em>. A star's altitude and azimuth change every minute as the sky turns, and a star high in your sky is below the horizon for someone in Argentina. Great for "point your telescope here, right now." Useless for writing down a star's address in a catalog.</div>
      <p>That tension — convenient but local — is the whole motivation for tomorrow's lesson. We'll build a second coordinate system that <em>ignores</em> where you stand and when you look, so a star's coordinates stay fixed. Hold onto the complaint "but it keeps changing!" — that complaint is the seed of the next idea.</p>
    `,
    takeaways:[
      "Altitude = angle above the horizon (0°–90°); zenith is straight up.",
      "Azimuth = compass bearing around the horizon (N=0°, E=90°, S=180°, W=270°).",
      "Horizon coordinates are observer-centered and time-dependent — they constantly change."
    ],
    refs:[
      {kind:"Interactive",title:"In-The-Sky.org — Sky Map",desc:"Set your location and it shows live altitude/azimuth for planets and bright stars. Watch the numbers tick.",url:"https://in-the-sky.org/skymap.php"},
      {kind:"History",title:"The astrolabe",desc:"For a millennium, this brass instrument computed altitude and azimuth by hand. A gorgeous physical embodiment of today's lesson.",url:"https://www.google.com/search?q=astrolabe+how+it+works+altitude+azimuth"},
    ],
    reflect:"If a star is at altitude 90°, what is its azimuth? (Think carefully — this is a famous little gotcha about the zenith.)"
  },
  {
    title:"A Map That Doesn't Move: RA & Dec",
    big:"Bolt the coordinate grid to the stars instead of to the Earth, and a star's address never changes — that's right ascension and declination.",
    recall:{q:"Yesterday's complaint: why are altitude and azimuth a poor way to record a star's position in a catalog?",
            a:"Because they depend on the observer's location and the time — they change constantly as the sky turns and differ from place to place."},
    body:`
      <p>We want coordinates that stay put. The fix is elegant: take the latitude/longitude grid you already know from Earth and project it outward onto the celestial sphere. Now the grid spins <em>with</em> the stars, so each star keeps the same address forever (almost — wait for the wrinkle in two days).</p>
      <h3>Declination — celestial latitude</h3>
      <p>Extend Earth's equator outward and you get the <em>celestial equator</em>. <em>Declination (Dec)</em> measures how far north (+) or south (–) of it a star sits, from +90° at the north celestial pole to –90° at the south, in degrees. Polaris sits at about +89° — almost exactly on the pole, which is why it barely moves.</p>
      <h3>Right ascension — celestial longitude</h3>
      <p><em>Right ascension (RA)</em> is the east–west coordinate. Here's the quirk that confuses everyone: RA is measured in <em>hours, minutes, and seconds of time</em>, not degrees. The full circle is 24 hours, so 1 hour of RA = 15°. Why time? Because the sky turns 360° in roughly 24 hours, so "RA" is essentially a clock telling you <em>when</em> a star crosses your meridian.</p>
      <div class="aside"><b>The compounding connection:</b> notice we now have <em>two</em> systems. Altitude/azimuth (yesterday) says where a star is for you right now. RA/Dec says where a star is, period. Converting between them requires knowing your latitude and the time — and that conversion is the quiet engine inside every "go-to" telescope.</div>
      <p>Where's the zero point of RA? We need an agreed "celestial Greenwich." Astronomers chose the <em>vernal equinox</em> — the spot where the Sun crosses the celestial equator heading north each spring. That choice will come back to haunt us pleasantly tomorrow, when we follow the Sun's path and discover why we have seasons.</p>
    `,
    takeaways:[
      "Declination = celestial latitude, +90° (N pole) to –90° (S pole), in degrees.",
      "Right ascension = celestial longitude, measured in hours (24ʰ = 360°, so 1ʰ = 15°).",
      "RA/Dec are fixed to the stars, so they don't change with your location or the time.",
      "The zero of RA is the vernal equinox — a point we'll meet again tomorrow."
    ],
    refs:[
      {kind:"Atlas",title:"Aladin Lite",desc:"A real research-grade sky atlas in your browser. Hover anywhere and read off the RA/Dec. Search 'Betelgeuse' and see its catalog address.",url:"https://aladin.cds.unistra.fr/AladinLite/"},
      {kind:"Essay",title:"Why right ascension is measured in hours",desc:"A short, satisfying explanation of the time/angle duality at the heart of today's lesson.",url:"https://www.google.com/search?q=why+is+right+ascension+measured+in+hours"},
    ],
    reflect:"Polaris is at Dec ≈ +89°. From the North Pole, what is its altitude? From the equator? You've just discovered the link between your latitude and the sky — we'll formalize it soon."
  },
  {
    title:"The Sun's Wandering Path & the Seasons",
    big:"The Sun drifts a full circle through the stars each year along a tilted line — and that tilt, not our distance from the Sun, is why summer is warm.",
    recall:{q:"Where is the zero point of right ascension, and why might that particular point be special?",
            a:"The vernal equinox — where the Sun crosses the celestial equator going north. It's special because it sits on the Sun's annual path, the ecliptic, which is today's topic."},
    body:`
      <p>The stars hold still relative to each other, but the Sun does not. Day by day it slides eastward against the background stars, tracing a complete great circle over a year. That path is the <em>ecliptic</em>. The catch — and the source of everything interesting — is that the ecliptic is <em>tilted</em> about 23.5° relative to the celestial equator. This tilt is the <em>obliquity</em>, and it is simply the tilt of Earth's spin axis projected onto the sky.</p>
      <h3>Where ecliptic meets equator</h3>
      <p>The two circles cross at two points: the <em>vernal equinox</em> (Sun heading north — yesterday's RA zero point) and the <em>autumnal equinox</em> (Sun heading south). Halfway between, the Sun reaches its highest and lowest declinations — the <em>solstices</em>.</p>
      <h3>The seasons, demystified</h3>
      <p>A near-universal misconception: that summer happens when Earth is closest to the Sun. It isn't — in fact the Northern Hemisphere summer occurs when Earth is slightly <em>farther</em> away. The real cause is the 23.5° tilt, working two ways at once:</p>
      <p>First, in your hemisphere's summer the Sun climbs higher, so its light strikes the ground more steeply and concentrates its energy on a smaller patch. Second, the Sun stays above the horizon longer, so it heats for more hours. Steeper plus longer equals warmer. Flip both in winter.</p>
      <div class="aside"><b>The compounding payoff:</b> the Sun's changing declination through the year <em>is</em> the seasons. We measured declination two days ago as an abstract coordinate — now it's the thermostat of the planet. This is the pattern of this whole course: a dry definition turns out to run something you care about.</div>
    `,
    takeaways:[
      "The ecliptic is the Sun's annual path through the stars, tilted ~23.5° to the celestial equator.",
      "That tilt (obliquity) = the tilt of Earth's axis; equinoxes and solstices are where the Sun crosses or peaks.",
      "Seasons are caused by axial tilt (sunlight angle + day length), NOT by Earth's distance from the Sun."
    ],
    refs:[
      {kind:"Video",title:"The reason for the seasons (and why most people get it wrong)",desc:"The famous 'A Private Universe' study found even Harvard graduates explained seasons wrong. Watch and check yourself.",url:"https://www.google.com/search?q=A+Private+Universe+seasons+misconception+video"},
      {kind:"Interactive",title:"NASA — Earth's tilt & seasons simulator",desc:"Drag Earth around its orbit and watch the sunlight angle change. The tilt does all the work.",url:"https://www.google.com/search?q=NASA+seasons+axial+tilt+interactive+simulation"},
    ],
    reflect:"If Earth's axis had zero tilt, would we have any seasons at all? What would the Sun's daily path look like, every day of the year?"
  },
  {
    title:"The Slow Wobble: Precession",
    big:"Earth spins like a dying top, and over 26,000 years its axis sweeps a great circle — slowly rewriting the star maps and even the zero point we just set.",
    recall:{q:"What is the obliquity, and what everyday phenomenon does it cause?",
            a:"The ~23.5° tilt of Earth's axis relative to its orbit (the ecliptic vs. celestial equator). It causes the seasons."},
    body:`
      <p>Spin a top and watch its axis trace slow cones in the air even as it spins fast. The Earth does exactly this. The Sun and Moon tug on Earth's equatorial bulge, and the spinning Earth responds not by toppling but by <em>precessing</em> — its axis sweeps out a huge cone, completing one circle every ~25,800 years. This is the <em>precession of the equinoxes</em>, first noticed by Hipparchus around 130 BCE by comparing his star positions with older records.</p>
      <h3>Why this matters to a star catalog</h3>
      <p>Remember the boast from two days ago — that RA/Dec are "fixed forever"? Precession is the asterisk. As the axis swings, the celestial poles drift and the equinox (our RA zero point) creeps along the ecliptic by about 50 arcseconds per year. So the entire coordinate grid slowly slides over the stars.</p>
      <div class="aside"><b>The compounding wrinkle:</b> because the grid moves, a star's RA/Dec are only "permanent" relative to a stated date, called the <em>epoch</em>. Modern catalogs say "J2000.0" — coordinates as of January 1, 2000. Your earlier mental model ("addresses never change") was a useful lie; precession is the correction.</div>
      <p>Two consequences you can almost see in a human lifetime's worth of records: the "pole star" changes. Polaris is our north star now, but 4,800 years ago it was Thuban in Draco, and in ~12,000 years it will be brilliant Vega. And the zodiac signs have drifted nearly a full sign off the constellations they were named for — which is why astrology's "sun signs" no longer match the sky.</p>

    body:`
      <p>Here's a puzzle. The Earth turns once on its axis in about 23 hours 56 minutes — call that a turn relative to the distant stars, a <em>sidereal day</em>. Yet your clock and the Sun agree the day is 24 hours, a <em>solar day</em>. Where do the missing ~4 minutes come from?</p>
      <h3>The orbit is the culprit</h3>
      <p>While the Earth spins once, it has also moved a little way along its orbit around the Sun — about 1° of its 360° yearly trip. So after one full spin (one sidereal day), the Earth must rotate a bit <em>more</em> — about 1° more, which takes about 4 minutes — to bring the Sun back to the same place in the sky. The stars don't demand this extra turn because they're effectively infinitely far away; the nearby Sun does.</p>
      <div class="eq">1 solar day ≈ 1 sidereal day + 4 minutes&nbsp;&nbsp;·&nbsp;&nbsp;365 solar days ≈ 366 sidereal days</div>

      <p>The practical upshot for an observer: a given star rises about 4 minutes earlier each night. Over a month that's two hours; over a season the night sky has completely turned over. The constellations of winter and summer are different for this reason — and you now know it's the orbit, not the spin, doing the bookkeeping.</p>

    big:"Astronomy's brightness scale is backwards, logarithmic, and 2,000 years old — and once you accept all three quirks it becomes wonderfully precise.",

    body:`
      <p>We can now point at any star. The next question is: how much light is it sending us? The answer uses the strangest unit in science — the <em>magnitude</em> — and it's strange because we inherited it from Hipparchus (him again) around 150 BCE. He sorted naked-eye stars into six classes: the brightest were "first magnitude," the faintest his eye could catch were "sixth magnitude."</p>
      <h3>Quirk one: it runs backwards</h3>
      <p>Bigger number = fainter star. A 1st-magnitude star is bright; a 6th-magnitude star is dim. This feels wrong forever; just accept it. The brightest objects even push into negative numbers — Sirius is about –1.4, the full Moon about –12.7, the Sun about –26.7.</p>
      <h3>Quirk two: it's logarithmic</h3>
      <p>In the 1850s Norman Pogson noticed the eye's "6 steps" corresponded to roughly a hundred-fold range in actual light. He nailed it down by <em>defining</em> a difference of 5 magnitudes to be exactly a factor of 100 in brightness (flux). So each single magnitude step is the fifth root of 100, about 2.512×.</p>
      <div class="eq">m₁ − m₂ = −2.5 log₁₀(F₁ / F₂)</div>
      <p>The minus sign encodes "backwards"; the 2.5 and the log encode "fifth root of 100." This single equation replaces Hipparchus's eyeball with a measurement good to thousandths of a magnitude.</p>
      <div class="aside"><b>Why logarithmic is not a curse but a gift:</b> your senses are roughly logarithmic (so is hearing, in decibels). A scale that matches perception <em>and</em> compresses an enormous range — from the Sun to the faintest galaxy, spanning a factor of trillions — into a tidy span of ~60 magnitudes is doing real work.</div>
      <p>One thing this scale does <em>not</em> tell you: whether a star looks bright because it's truly luminous or merely because it's close. That confusion is the cliffhanger for tomorrow.</p>
    `,

    big:"Bring every star to the same distance in your mind, and apparent brightness becomes true luminosity — the move that lets us rank the stars honestly.",

    body:`
      <p>Yesterday's cliffhanger: a dim-looking star might be a faint bulb next door or a searchlight across the galaxy. Apparent magnitude can't tell them apart because it mixes two things — how much light a star emits, and how far that light had to travel and spread out.</p>
      <h3>The inverse-square dilution</h3>
      <p>Light from a star spreads over an expanding sphere, so the flux you receive falls off as 1/distance². Double the distance, quarter the brightness. This is why a streetlamp and a star can deliver the same trickle of light to your eye.</p>
      <h3>The honest fix: absolute magnitude</h3>
      <p>To compare stars fairly, imagine lining them all up at one standard distance — astronomers chose <em>10 parsecs</em> — and asking how bright each <em>would</em> look there. That hypothetical brightness is the <em>absolute magnitude (M)</em>. It strips out distance and leaves pure luminosity. The Sun, blinding at –26.7 from here, would be a modest +4.8 from 10 parsecs — barely visible.</p>
      <h3>The bridge: the distance modulus</h3>
      <p>The gap between how bright a star looks (m) and how bright it truly is (M) is exactly the fingerprint of its distance:</p>
      <div class="eq">m − M = 5 log₁₀(d / 10 pc)</div>
      <p>This little equation, the <em>distance modulus</em>, is one of the most important tools in all of astronomy. If you can find a star's true brightness M by some independent means, then measuring its apparent m hands you its distance d. Whole rungs of the cosmic distance ladder — out to other galaxies — are built on exactly this trade.</p>
      <div class="aside"><b>The compounding capstone of Chapter 1:</b> Day 7 gave us m (how bright it looks) and the logarithmic scale; today gives us M (how bright it is) and the inverse-square law. The distance modulus welds them into a distance-measuring machine. We've gone from "the stars are dots on a dome" (Day 1) to "we can measure how far away those dots are." That arc — from naming the sky to measuring it — is Chapter 1.</div>

  {
    title:"Kepler's Three Laws",
    big:"A man who never saw a clear advantage in circles spent a decade wrestling Mars — and emerged with three laws that ended two thousand years of perfect circles.",
    recall:{q:"In one sentence: what does the distance modulus m − M let you do?",
            a:"If you know a star's true brightness (M) and measure how bright it looks (m), the gap gives you its distance."},
    body:`
      <p>For two millennia, everyone "knew" the heavens ran on perfect circles — it was almost a moral conviction. Then Tycho Brahe, a Danish nobleman with a metal nose and an obsession with precision, spent decades recording planetary positions to better than an arcminute, all with the naked eye, just before the telescope arrived. When he died, that mountain of data fell to his assistant, Johannes Kepler.</p>
      <p>Kepler tried to fit Mars to a circle and got an error of 8 arcminutes. A lesser scientist would have shrugged it off. Kepler trusted Tycho's data more than the dogma — and that 8-arcminute stubbornness broke the circle open.</p>
      <h3>The three laws</h3>
      <p><em>First law:</em> planets move in <em>ellipses</em>, with the Sun at one focus (not the center). An ellipse's elongation is its <em>eccentricity</em> e; a circle is just e = 0.</p>
      <p><em>Second law:</em> a line from the Sun to a planet sweeps out <em>equal areas in equal times</em>. So a planet races when near the Sun (perihelion) and dawdles when far (aphelion). This is secretly a conservation law in disguise — we'll unmask it on Day 12.</p>
      <p><em>Third law:</em> the square of the orbital period is proportional to the cube of the semi-major axis.</p>
      <div class="eq">P² = a³&nbsp;&nbsp;(P in years, a in AU, for the Sun)</div>
      <div class="aside"><b>The compounding turn:</b> these three laws are gorgeous — and completely <em>descriptive</em>. Kepler found the pattern but had no idea <em>why</em>. That "why" is a falling apple away, and it's tomorrow's lesson.</div>
    `,

      "Law 1: orbits are ellipses with the Sun at one focus (eccentricity e measures elongation; e=0 is a circle).",

      "Law 3: P² = a³ (in years and AU) — period and orbit size are locked together.",
      "Kepler's laws describe motion precisely but do not explain its cause."
    ],

    title:"Newton's Gravity",
    big:"Newton's leap wasn't the apple — it was daring to ask whether the same force that drops the apple also holds the Moon in the sky.",
    recall:{q:"Kepler gave us three precise laws of planetary motion. What crucial thing did they NOT provide?",
            a:"An explanation — the cause. Kepler described how planets move but not why."},
    body:`
      <p>Kepler had the choreography; Newton found the music. His three laws of motion (inertia; F = ma; action–reaction) describe how anything moves when pushed. But the masterstroke was proposing a single, universal force of <em>gravity</em>.</p>
      <h3>Universal gravitation</h3>
      <p>Every mass attracts every other mass, with a force that grows with the masses and falls off with the square of the distance between them:</p>
      <div class="eq">F = G · m₁m₂ / r²</div>
      <p>The word that matters is <em>universal</em>. The same law that pulls an apple to the ground reaches all the way to the Moon. Newton checked it: the Moon's acceleration toward Earth is about 1/3600 of the apple's — and the Moon is about 60 Earth-radii away, and 60² = 3600. The inverse square held across a quarter-million miles. That single number-match is one of the most thrilling confirmations in physics.</p>
      <div class="aside"><b>Why the inverse square?</b> Picture gravity's "influence" spreading out over a sphere, just like light did in Chapter 3. The surface of a sphere grows as r², so anything spreading over it thins as 1/r². Gravity and starlight dilute by the same geometry — keep that echo in mind.</div>
      <p>G, the gravitational constant, is fantastically tiny, which is why you don't feel the pull of the person next to you — and why measuring G (Cavendish, 1798, with lead balls on a torsion wire) was a heroic feat. With Newton's law in hand, Kepler's three laws stop being mysterious rules and become <em>inevitable consequences</em>. Proving that is Day 12's payoff.</p>
    `,

  {
    title:"The Two-Body Problem & Center of Mass",
    big:"The Sun does not sit still while planets circle it — it traces its own little loop, and that tiny wobble is how we found the first planets around other stars.",
    recall:{q:"What does the 'universal' in Newton's universal gravitation buy us?",
            a:"The same gravity law applies everywhere and to everything — apple, Moon, planets, distant stars — which is what makes Kepler's laws derivable from it."},
    body:`
      <p>We usually say "the planet orbits the Sun," but that's a convenient half-truth. By Newton's third law, the planet pulls the Sun exactly as hard as the Sun pulls the planet. So both bodies orbit a shared balance point: the <em>center of mass</em>, or <em>barycenter</em>.</p>
      <h3>The seesaw rule</h3>
      <p>The barycenter sits closer to the heavier body, in inverse proportion to mass — exactly like two children balancing a seesaw:</p>
      <div class="eq">m₁ r₁ = m₂ r₂</div>
      <p>For the Sun–Jupiter pair, the Sun is ~1000× heavier, so the barycenter sits just outside the Sun's surface, and the Sun swings around it in a small circle once every 12 years. The Sun wobbles.</p>
      <div class="aside"><b>The compounding payoff — and a callback to Day 1:</b> we opened this whole course by surrendering distance and keeping direction. Now watch that pay dividends. We can't see planets around other stars directly, but we <em>can</em> watch a distant star wobble — either as a tiny back-and-forth on the sky, or (using the Doppler shift we'll meet on Day 25) as a rhythmic shift in its spectrum. The wobble betrays an unseen companion. That is literally how thousands of exoplanets were discovered.</div>
      <p>This reframing also matters for the math: the messy two-body problem (two things pulling on each other) can be cleverly rewritten as one "reduced mass" orbiting a fixed center. That trick turns an intractable tangle into the clean single-body problem we'll solve on Day 12 — where Kepler's laws finally fall out of Newton's.</p>

  {
    title:"Deriving the Orbit: Energy & Angular Momentum",
    big:"Two conservation laws — of angular momentum and of energy — are the hidden machinery behind every one of Kepler's rules, and they hand us a way to weigh the stars.",
    recall:{q:"Why does even the Sun move in a small orbit rather than sitting perfectly still?",

    body:`
      <p>Now the satisfying part: we feed Newton's gravity into Newton's motion and out drop Kepler's laws — no longer rules to memorize but theorems to prove.</p>
      <h3>Kepler's 2nd law is angular momentum</h3>
      <p>Gravity always points along the line joining the two bodies, so it exerts no twist (torque) about the center. No torque means <em>angular momentum is conserved</em>. Work out what constant angular momentum implies for the area swept per second, and you get exactly "equal areas in equal times." Kepler's mysterious 2nd law was a conservation law wearing a costume.</p>
      <h3>Energy sets the shape</h3>
      <p>The total orbital energy (kinetic + gravitational) is also conserved, and it controls the orbit's shape: negative energy ⇒ a bound ellipse; zero ⇒ a parabola (just barely escaping); positive ⇒ a hyperbola (flyby). For a bound orbit, energy depends only on the semi-major axis:</p>
      <div class="eq">E = − G M m / (2a)&nbsp;&nbsp;·&nbsp;&nbsp;v² = G M (2/r − 1/a)&nbsp;[vis-viva]</div>
      <p>The vis-viva equation tells you a body's speed anywhere in its orbit — and instantly gives the escape velocity (set a → ∞).</p>
      <div class="aside"><b>The crown jewel:</b> redoing Kepler's 3rd law with Newton's physics adds the masses to it: P² = 4π²a³ / [G(m₁+m₂)]. This is arguably the single most important equation in astrophysics, because measuring an orbit's period and size lets you <em>weigh things you can never visit</em> — binary stars, the Milky Way, distant galaxies. Almost every mass in the universe is known because of this relation.</div>
    `,

      {kind:"Tool",title:"The vis-viva equation in practice",desc:"How mission planners use it for orbital transfers and gravity assists. The same math that flies spacecraft.",url:"https://www.google.com/search?q=vis-viva+equation+orbital+mechanics+explained"},

  {
    title:"The Virial Theorem",
    big:"For anything held together by gravity, motion and binding settle into a fixed accounting ratio — and that single ratio lets us weigh clusters and first revealed dark matter.",
    recall:{q:"What can Newton's version of Kepler's 3rd law measure that the original could not?",
            a:"Mass — measuring an orbit's period and size yields the masses of the bodies, letting us weigh stars and galaxies."},
    body:`
      <p>Kepler's laws handle two bodies. But a star cluster has a million stars, a galaxy a hundred billion — no one solves those orbits one by one. Instead we use a beautiful statistical shortcut that holds for any stable, gravitationally bound system, averaged over time:</p>
      <div class="eq">2⟨K⟩ + ⟨U⟩ = 0</div>
      <p>In words: twice the average kinetic energy plus the average gravitational potential energy is zero. The system settles into a fixed balance between how fast its members move and how tightly gravity binds them.</p>
      <h3>Two consequences worth their weight in gold</h3>
      <p><em>Collapsing things heat up.</em> When a gas cloud contracts, U becomes more negative; the virial theorem demands K rise to keep the balance — so the cloud heats. Half the released gravitational energy goes into motion (heat), half is radiated away. This is exactly why a protostar warms as it shrinks, eventually hot enough to ignite. We'll cash this in when we reach star formation.</p>
      <p><em>We can weigh what we can't orbit.</em> Measure how fast stars or galaxies are buzzing around inside a cluster, and the virial theorem hands you the total mass holding them together.</p>
      <div class="aside"><b>A discovery that broke the universe:</b> in 1933 Fritz Zwicky applied exactly this to the Coma cluster of galaxies. The galaxies were moving far too fast for the visible matter to hold them — by the virial theorem, the cluster needed vastly more mass than its stars could supply. He called the missing mass "dunkle Materie" — dark matter. Ninety years later we still don't know what it is. This humble energy-accounting equation cracked open the biggest open question in physics.</div>
      <p>That closes Chapter 2: from Kepler's patterns, to Newton's cause, to conservation laws that let us weigh — and find the limits of — everything that gravity touches.</p>
    `,
